name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        id: typecheck
        continue-on-error: true
        run: npm run typecheck > typecheck.log 2>&1

      - name: Upload type check errors
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-errors
          path: typecheck.log
          retention-days: 1

      - name: Fail on type check errors
        if: steps.typecheck.outcome == 'failure'
        run: |
          cat typecheck.log
          exit 1

      - name: Unit tests
        run: npm run test

      - name: Generate Drizzle migrations
        run: npm run db:generate

      - name: Commit generated migrations
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if [ -z "$(git status --porcelain -- drizzle/migrations)" ]; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add drizzle/migrations
          git commit -m "chore: generate asset Drizzle migration"
          git push origin "HEAD:${{ github.head_ref }}"

      - name: Verify generated migrations are committed
        run: test -z "$(git status --porcelain -- drizzle/migrations)"

      - name: Validate Drizzle migrations
        run: npm run db:check

      - name: Apply migrations to local D1
        run: npm run db:migrate:local

      - name: Confirm migrations are idempotent
        run: npm run db:migrate:local

      - name: Next.js build
        run: npm run build

      - name: Cloudflare OpenNext build
        run: npm run cf:build
