name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Type check
        id: typecheck
        continue-on-error: true
        run: npm run typecheck > typecheck.log 2>&1

      - name: Upload type check errors
        if: steps.typecheck.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-errors
          path: typecheck.log
          retention-days: 1

      - name: Fail on type check errors
        if: steps.typecheck.outcome == 'failure'
        run: |
          cat typecheck.log
          exit 1

      - name: Unit tests
        id: tests
        continue-on-error: true
        run: npm run test > test.log 2>&1

      - name: Upload unit test errors
        if: steps.tests.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-errors
          path: test.log
          retention-days: 1

      - name: Fail on unit test errors
        if: steps.tests.outcome == 'failure'
        run: |
          cat test.log
          exit 1

      - name: Generate Drizzle migrations
        run: npm run db:generate

      - name: Commit generated TASK-014 migration
        if: github.event_name == 'pull_request' && github.head_ref == 'task/014-course-foundation'
        run: |
          if [ -n "$(git status --porcelain -- drizzle/migrations)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add drizzle/migrations
            git commit -m "db: generate course and chapter migrations"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Verify generated migrations are committed
        run: test -z "$(git status --porcelain -- drizzle/migrations)"

      - name: Validate Drizzle migrations
        run: npm run db:check

      - name: Apply migrations to local D1
        run: npm run db:migrate:local

      - name: Confirm migrations are idempotent
        run: npm run db:migrate:local

      - name: Next.js build
        run: npm run build

      - name: Cloudflare OpenNext build
        run: npm run cf:build
